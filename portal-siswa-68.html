                    <h3>Menyinkronkan Data...</h3>
                </div>
            `;

            try {
                const snapshot = await db.collection('absensiSiswa').where('siswaId', '==', currentSiswa.id).orderBy('timestamp', 'desc').get();
                const stats = { hadir: 0, sakit: 0, izin: 0, dispensasi: 0, alpa: 0, terlambat: 0 };
                let rows = '';
                
                snapshot.forEach(doc => {
                    const d = doc.data();
                    stats[d.status] = (stats[d.status] || 0) + 1;
                    
                    const tgl = d.timestamp ? d.timestamp.toDate().toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}) : (d.tanggal || '-');
                    const waktu = d.timestamp ? d.timestamp.toDate().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' }) : '-';
                    
                    if (d.status === 'hadir' && d.timestamp) {
                        const h = d.timestamp.toDate().getHours();
                        const m = d.timestamp.toDate().getMinutes();
                        if (h > 6 || (h === 6 && m > 30)) {
                            stats.terlambat++;
                        }
                    }

                    rows += `<tr>
                                <td><div style="font-weight:700; color:var(--primary-dark);">${tgl}</div><div style="font-size:0.8rem; color:var(--text-muted);"><i class="far fa-clock"></i> ${waktu}</div></td>
                                <td><span class="badge ${d.status}">${d.status}</span></td>
                                <td><div style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${d.keterangan || '-'}">${d.keterangan || '-'}</div></td>
                                <td>${d.buktiUrl ? `<a href="${d.buktiUrl}" target="_blank" class="btn-primary" style="padding:6px 12px; font-size:0.8rem; border-radius:6px;"><i class="fas fa-external-link-alt"></i> Cek</a>` : '-'}</td>
                             </tr>`;
                });
                
                container.innerHTML = `
                    <div class="page-header">
                        <h2>Riwayat Absensi</h2>
                        <p>Rekapitulasi jejak kehadiran Anda di SMAN 68 Jakarta.</p>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card"><h3 style="color:#059669;">${stats.hadir}</h3><p>Hadir</p></div>
                        <div class="stat-card"><h3 style="color:#ea580c;">${stats.terlambat}</h3><p>Terlambat</p></div>
                        <div class="stat-card"><h3 style="color:#dc2626;">${stats.sakit}</h3><p>Sakit</p></div>
                        <div class="stat-card"><h3 style="color:#d97706;">${stats.izin}</h3><p>Izin</p></div>
                        <div class="stat-card"><h3 style="color:#2563eb;">${stats.dispensasi}</h3><p>Dispen</p></div>
                        <div class="stat-card"><h3 style="color:#be185d;">${stats.alpa}</h3><p>Alpa</p></div>
                    </div>
                    
                    <div class="card" style="padding:0; overflow:hidden;">
                        <div class="card-header" style="padding:25px 25px 0 25px; margin-bottom:15px;">
                            <div class="card-title">
                                <div class="card-title-icon"><i class="fas fa-list-alt"></i></div>
                                <h3>Log Data Kehadiran</h3>
                            </div>
                        </div>
                        <div class="table-wrapper" style="border:none; border-radius:0;">
                            <table>
                                <thead><tr><th>Waktu Input</th><th>Status</th><th>Keterangan Tambahan</th><th>Lampiran</th></tr></thead>
                                <tbody>${rows || '<tr><td colspan="4" style="text-align:center; padding:40px; color:var(--text-muted);"><i class="fas fa-folder-open" style="font-size:2rem; margin-bottom:10px; display:block;"></i>Belum ada data historis</td></tr>'}</tbody>
                            </table>
                        </div>
                    </div>`;
            } catch (e) { 
                console.error(e);
                container.innerHTML = `
                    <div class="page-header"><h2>Riwayat Absensi</h2></div>
                    <div style="text-align:center; padding:50px; color:#ef4444;">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; margin-bottom:20px;"></i>
                        <h3>Gagal Mengambil Data</h3>
                        <p>Terjadi kesalahan koneksi. Silakan muat ulang halaman.</p>
                    </div>`;
            }
        }

        // 6. Profil
        function loadProfil(container) {
            const d = currentSiswa;
            const inisial = d.nama.substring(0, 2).toUpperCase();
            
            container.innerHTML = `
                <div class="page-header">
                    <h2>Profil Siswa</h2>
                    <p>Informasi detail akun akademik Anda.</p>
                </div>
                
                <div class="card" style="position:relative; overflow:hidden;">
                    <!-- Dekorasi Background -->
                    <div style="position:absolute; top:0; left:0; right:0; height:120px; background:linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);"></div>
                    
                    <div class="profile-hero" style="position:relative; z-index:1; padding-top:40px;">
                        <div class="profile-hero-avatar">${inisial}</div>
                        <div class="profile-hero-info">
                            <h2>${d.nama}</h2>
                            <p style="margin-bottom:10px;"><i class="fas fa-graduation-cap"></i> SMAN 68 Jakarta • Kelas ${d.kelas} ${d.jurusan}</p>
                            <span class="badge ${d.status === 'approved' ? 'hadir' : 'sakit'}"><i class="fas fa-circle" style="font-size:0.6rem; margin-right:4px;"></i> ${d.status === 'approved' ? 'Akun Aktif' : 'Status: ' + d.status}</span>
                        </div>
                    </div>
                    
                    <hr style="border:0; border-top:1px solid var(--border-light); margin:30px 0;">
                    
                    <div class="profile-grid">
                        <div class="profile-data-card"><h4>Nomor Induk Siswa (NIS)</h4><p>${d.nis || '-'}</p></div>
                        <div class="profile-data-card"><h4>NISN</h4><p>${d.nisn || '-'}</p></div>
                        <div class="profile-data-card"><h4>Jenis Kelamin</h4><p>${d.jenisKelamin === 'L' ? 'Laki-laki' : (d.jenisKelamin === 'P' ? 'Perempuan' : '-')}</p></div>
                        <div class="profile-data-card"><h4>Tanggal Lahir</h4><p>${d.tanggalLahir || '-'}</p></div>
                        <div class="profile-data-card"><h4>Bulan Masuk</h4><p>${d.tanggalMasuk || 'Juli 2024'}</p></div>
                        <div class="profile-data-card"><h4>Estimasi Kelulusan</h4><p>${d.tanggalLulus || 'Mei 2027'}</p></div>
                    </div>
                    
                    <div class="profile-data-card" style="margin-top:20px;">
                        <h4>Alamat Lengkap</h4>
                        <p>${d.alamat || '<span style="color:var(--text-muted); font-weight:normal; font-style:italic;">Belum diatur. Silakan lapor ke Tata Usaha untuk melengkapi data.</span>'}</p>
                    </div>
                </div>
                
                <div style="text-align:center; color:var(--text-muted); font-size:0.8rem; margin-top:40px; margin-bottom:20px;">
                    Portal Akademik SMAN 68 Jakarta &copy; 2026<br>
                    Dibangun dengan standar keamanan enkripsi terkini.
                </div>
            `;
        }
    </script>
</body>
</html>
