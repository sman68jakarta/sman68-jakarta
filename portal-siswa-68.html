<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Portal Siswa - SMAN 68 Jakarta</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png">
    
    <style>
        /* =========================================================
           PREMIUM DESIGN SYSTEM - SMAN 68 JAKARTA
           ========================================================= */
        * { margin:0; padding:0; box-sizing:border-box; }

        :root {
            /* Royal Emerald & Gold Theme */
            --primary: #047857; /* Deep Emerald */
            --primary-dark: #022c22;
            --accent: #d4af37; /* Royal Gold */
            --accent-hover: #fcd34d;
            
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            
            /* Premium Shadows */
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
            --shadow-xl: 0 20px 40px -10px rgba(4, 120, 87, 0.08);
            --shadow-float: 0 30px 60px rgba(0, 0, 0, 0.12);
            
            /* Radii */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 30px;
            --radius-full: 999px;
            
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            background-image: 
                radial-gradient(at 0% 0%, hsla(160, 100%, 74%, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(43, 100%, 74%, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            /* Modern browser min-height fallback */
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography */
        h1, h2, h3, h4 { letter-spacing: -0.03em; font-weight: 800; color: var(--primary-dark); }
        p { line-height: 1.6; }

        /* =========================================================
           PRELOADER
           ========================================================= */
        .preloader {
            position: fixed; inset: 0; background: var(--bg-card); z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .preloader.hide { opacity: 0; visibility: hidden; }
        .spinner-logo {
            width: 80px; height: 80px; position: relative; animation: pulse 2s infinite ease-in-out;
        }
        .spinner-logo img { width: 100%; height: 100%; object-fit: contain; }
        .spinner-ring {
            position: absolute; inset: -15px; border-radius: 50%;
            border: 3px solid transparent; border-top-color: var(--primary);
            border-right-color: var(--accent);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* =========================================================
           LOGIN SCREEN (LUXURY & MOBILE-OPTIMIZED)
           ========================================================= */
        .login-overlay {
            position: fixed; inset: 0; z-index: 10000;
            display: grid; place-items: center; padding: 20px; /* Diperbarui menggunakan grid untuk penempatan tengah sempurna */
            background: url('https://media.indozone.id/crop/0x0:0x0/images/2026/01/14/1768352620_6966eb6c54bf6_maxresdefault.jpg') center/cover no-repeat;
            background-attachment: fixed;
            overflow-y: auto; /* Memungkinkan scroll dengan lancar jika keyboard muncul */
        }
        .login-overlay::before {
            content: ''; position: fixed; inset: 0;
            background: linear-gradient(135deg, rgba(2,44,34,0.6) 0%, rgba(4,120,87,0.4) 100%);
            z-index: -1;
        }
        .login-card {
            position: relative; z-index: 1; width: 100%; max-width: 440px; margin: auto; /* Margin auto menstabilkan grid */
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4);
            border-radius: var(--radius-lg); padding: 45px 35px;
            box-shadow: var(--shadow-float); text-align: center;
            transform: translateY(20px); opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeUp { to { transform: translateY(0); opacity: 1; } }
        
        .login-logo {
            width: 85px; height: 85px; background: white; border-radius: 50%; padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 0 auto 20px;
            border: 2px solid var(--border-light);
            transition: var(--transition);
        }
        .login-card h2 { font-size: 1.8rem; margin-bottom: 8px; background: linear-gradient(to right, var(--primary-dark), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-card p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 18px; text-align: left; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; transition: var(--transition); }
        .toggle-pass { left: auto !important; right: 18px; cursor: pointer; }
        .input-group input {
            width: 100%; padding: 15px 20px 15px 50px;
            background: #f8fafc; border: 2px solid transparent;
            border-radius: var(--radius-sm); font-family: inherit; font-size: 1rem;
            color: var(--text-main); font-weight: 500; transition: var(--transition);
        }
        .input-group input:focus {
            background: white; border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(4, 120, 87, 0.1);
        }
        .input-group input:focus + i { color: var(--primary); }
        
        .btn-login {
            width: 100%; padding: 15px; margin-top: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white; border: none; border-radius: var(--radius-sm);
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px rgba(4, 120, 87, 0.2); transition: var(--transition);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(4, 120, 87, 0.3); }
        
        .login-footer { margin-top: 25px; display: flex; flex-direction: column; align-items: center; gap: 12px; font-size: 0.95rem; }
        .login-footer a { color: var(--primary); text-decoration: none; font-weight: 700; transition: var(--transition); }
        .login-footer a:hover { color: var(--accent); }

        /* =========================================================
           MAIN PORTAL LAYOUT
           ========================================================= */
        .main-portal { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }

        /* Topbar (Glassmorphism) */
        .topbar {
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.5);
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm);
        }
        .topbar-left { display: flex; align-items: center; gap: 15px; }
        .topbar-logo { width: 45px; height: 45px; border-radius: 12px; background: white; padding: 4px; box-shadow: var(--shadow-sm); }
        .topbar-brand h1 { font-size: 1.2rem; margin: 0; color: var(--primary-dark); }
        .topbar-brand span { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        
        .topbar-right { display: flex; align-items: center; gap: 20px; }
        .datetime { font-size: 0.9rem; font-weight: 600; color: var(--primary); background: rgba(4,120,87,0.1); padding: 8px 15px; border-radius: var(--radius-full); }
        .user-profile-btn { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-avatar-small { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: var(--primary-dark); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; border: 2px solid white; box-shadow: var(--shadow-sm); }
        
        /* Content Layout */
        .content-wrapper { display: flex; flex: 1; position: relative; max-width: 1600px; margin: 0 auto; width: 100%; }

        /* Premium Sidebar */
        .sidebar {
            width: 260px; background: transparent; padding: 30px 20px;
            display: flex; flex-direction: column; gap: 8px;
            position: sticky; top: 76px; height: calc(100vh - 76px); height: calc(100dvh - 76px); overflow-y: auto;
            border-right: 1px solid rgba(0,0,0,0.05);
        }
        .sidebar::-webkit-scrollbar { width: 0; }
        .sidebar-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin: 10px 0 10px 15px; font-weight: 800; }
        
        .sidebar-item {
            padding: 14px 20px; color: var(--text-muted); text-decoration: none;
            font-weight: 600; font-size: 0.95rem; border-radius: var(--radius-sm);
            display: flex; align-items: center; gap: 15px; transition: var(--transition);
            position: relative; overflow: hidden;
        }
        .sidebar-item i { font-size: 1.2rem; width: 24px; text-align: center; transition: var(--transition); }
        .sidebar-item:hover { color: var(--primary); background: rgba(4,120,87,0.05); transform: translateX(5px); }
        .sidebar-item.active { background: linear-gradient(135deg, var(--primary) 0%, #059669 100%); color: white; box-shadow: var(--shadow-md); }
        .sidebar-item.active i { color: var(--accent); }
        
        .sidebar-logout { margin-top: auto; color: #ef4444; }
        .sidebar-logout:hover { background: #fef2f2; color: #dc2626; }

        /* Page Container */
        .page-container { flex: 1; padding: 30px 40px; overflow-x: hidden; }
        .page-header { margin-bottom: 30px; animation: fadeUp 0.5s ease forwards; }
        .page-header h2 { font-size: 2rem; color: var(--primary-dark); margin-bottom: 5px; }
        .page-header p { color: var(--text-muted); font-size: 1rem; }

        /* Cards */
        .card {
            background: var(--bg-card); border-radius: var(--radius-md);
            padding: 30px; box-shadow: var(--shadow-xl); margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.5);
            animation: fadeUp 0.5s ease forwards;
        }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px;
        }
        .card-title { display: flex; align-items: center; gap: 15px; }
        .card-title-icon {
            width: 45px; height: 45px; border-radius: 12px;
            background: rgba(4,120,87,0.1); color: var(--primary);
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
        }
        .card-title h3 { font-size: 1.3rem; margin: 0; }

        /* Hero Dashboard */
        .hero-dashboard {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            border-radius: var(--radius-md); padding: 40px; color: white;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow-float); margin-bottom: 30px; position: relative; overflow: hidden;
        }
        .hero-dashboard::after {
            content: '\f19d'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; right: -20px; top: -20px; font-size: 15rem;
            color: rgba(255,255,255,0.05); transform: rotate(-15deg); pointer-events: none;
        }
        .hero-text h2 { color: var(--accent); font-size: 2.5rem; margin-bottom: 10px; }
        .hero-text p { font-size: 1.1rem; opacity: 0.9; max-width: 500px; }
        .hero-profile { display: flex; align-items: center; gap: 20px; background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: var(--radius-md); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .hero-avatar { width: 70px; height: 70px; border-radius: 50%; background: var(--accent); color: var(--primary-dark); font-size: 2rem; font-weight: 800; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        /* Forms & Inputs */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.95rem; color: var(--primary-dark); }
        .form-input {
            width: 100%; padding: 14px 18px; border: 2px solid var(--border-light);
            border-radius: var(--radius-sm); font-family: inherit; font-size: 1rem;
            background: #f8fafc; transition: var(--transition); color: var(--text-main);
        }
        .form-input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(4, 120, 87, 0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .btn-primary {
            padding: 14px 28px; background: var(--primary); color: white;
            border: none; border-radius: var(--radius-sm); font-weight: 700;
            font-size: 1rem; cursor: pointer; transition: var(--transition);
            display: inline-flex; align-items: center; gap: 10px; box-shadow: var(--shadow-md);
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: var(--shadow-xl); }
        .btn-secondary { background: white; color: var(--text-main); border: 2px solid var(--border-light); box-shadow: none; }
        .btn-secondary:hover { background: #f1f5f9; border-color: #cbd5e1; transform: translateY(-2px); }

        /* Status Cards (Absensi) */
        .status-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .status-card {
            background: white; border: 2px solid var(--border-light);
            border-radius: var(--radius-md); padding: 20px 15px;
            text-align: center; cursor: pointer; transition: var(--transition);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .status-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: var(--shadow-md); }
        .status-card.active { border-color: var(--primary); background: rgba(4,120,87,0.03); ring: 2px solid var(--primary); box-shadow: var(--shadow-md); }
        .status-icon { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: var(--transition); }
        
        .status-card.hadir .status-icon { background: #d1fae5; color: #059669; }
        .status-card.active.hadir { border-color: #059669; }
        .status-card.sakit .status-icon { background: #fee2e2; color: #dc2626; }
        .status-card.active.sakit { border-color: #dc2626; }
        .status-card.izin .status-icon { background: #fef3c7; color: #d97706; }
        .status-card.active.izin { border-color: #d97706; }
        .status-card.dispensasi .status-icon { background: #dbeafe; color: #2563eb; }
        .status-card.active.dispensasi { border-color: #2563eb; }
        .status-card h4 { font-size: 1rem; margin: 0; color: var(--text-main); }

        /* Tables */
        .table-wrapper { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border-light); }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8fafc; color: var(--text-muted); padding: 16px; text-align: left; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid var(--border-light); }
        td { padding: 16px; border-bottom: 1px solid var(--border-light); font-size: 0.95rem; font-weight: 500; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }
        
        .badge { padding: 6px 12px; border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 700; display: inline-block; }
        .badge.hadir { background: #d1fae5; color: #059669; }
        .badge.sakit { background: #fee2e2; color: #dc2626; }
        .badge.izin { background: #fef3c7; color: #d97706; }
        .badge.dispensasi { background: #dbeafe; color: #2563eb; }
        .badge.alpa { background: #fce7f3; color: #be185d; }
        .badge.terlambat { background: #fff7ed; color: #ea580c; }

        /* Jadwal List */
        .filter-chip { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .chip {
            padding: 10px 20px; border-radius: var(--radius-full);
            border: 1px solid var(--border-light); background: white; color: var(--text-muted);
            cursor: pointer; font-size: 0.95rem; font-weight: 700; transition: var(--transition);
        }
        .chip:hover { border-color: var(--primary); color: var(--primary); }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: var(--shadow-md); }
        
        .jadwal-item {
            display: flex; align-items: center; gap: 20px;
            padding: 20px; border-radius: var(--radius-sm); background: white;
            border: 1px solid var(--border-light); margin-bottom: 15px;
            transition: var(--transition); position: relative; overflow: hidden;
        }
        .jadwal-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--primary); border-radius: 4px 0 0 4px; opacity: 0; transition: var(--transition); }
        .jadwal-item:hover { box-shadow: var(--shadow-md); transform: translateX(5px); border-color: transparent; }
        .jadwal-item:hover::before { opacity: 1; }
        .jadwal-item.done { opacity: 0.6; background: #f8fafc; }
        .jadwal-item.done .jadwal-mapel { text-decoration: line-through; color: var(--text-muted); }
        
        .jadwal-time { width: 120px; font-weight: 800; color: var(--primary-dark); font-size: 1.1rem; flex-shrink: 0; background: #f1f5f9; padding: 10px; border-radius: 8px; text-align: center; }
        .jadwal-info { flex: 1; }
        .jadwal-mapel { font-weight: 800; font-size: 1.1rem; margin-bottom: 4px; color: var(--text-main); }
        .jadwal-guru { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 5px; }
        
        .action-btn { width: 36px; height: 36px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); font-size: 0.9rem; }
        .btn-icon-edit { background: #fef3c7; color: #d97706; }
        .btn-icon-edit:hover { background: #fde68a; }
        .btn-icon-delete { background: #fee2e2; color: #dc2626; }
        .btn-icon-delete:hover { background: #fecaca; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px 20px; border-radius: var(--radius-md); text-align: center; box-shadow: var(--shadow-md); border: 1px solid var(--border-light); transition: var(--transition); }
        .stat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-xl); }
        .stat-card h3 { font-size: 2.5rem; font-weight: 800; margin-bottom: 5px; }
        .stat-card p { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* Calendar (Agenda) */
        .kalender-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .kalender-day-name { text-align: center; font-weight: 800; padding: 10px; font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; }
        .kalender-day {
            text-align: center; padding: 15px 5px; border-radius: var(--radius-sm);
            cursor: pointer; transition: var(--transition); font-size: 1rem; font-weight: 600;
            background: #f8fafc; border: 2px solid transparent; min-height: 60px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
        }
        .kalender-day:hover { background: white; border-color: var(--primary); box-shadow: var(--shadow-sm); transform: scale(1.05); z-index: 1; }
        .kalender-day.today { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(4,120,87,0.3); }
        .kalender-day.has-agenda::after { content:''; position:absolute; bottom:8px; width:6px; height:6px; background:var(--accent); border-radius:50%; }
        .kalender-day.today.has-agenda::after { background: white; }
        .kalender-day.empty { background: transparent; cursor: default; }
        .kalender-day.empty:hover { border-color: transparent; transform: none; box-shadow: none; }

        /* Profile Details */
        .profile-hero { display: flex; align-items: center; gap: 30px; margin-bottom: 40px; }
        .profile-hero-avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--accent); font-size: 3rem; font-weight: 800; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-xl); border: 4px solid white; }
        .profile-hero-info h2 { font-size: 2.2rem; margin-bottom: 5px; }
        .profile-hero-info p { font-size: 1.1rem; color: var(--text-muted); font-weight: 500; }
        
        .profile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .profile-data-card { background: #f8fafc; padding: 20px 25px; border-radius: var(--radius-sm); border: 1px solid var(--border-light); display: flex; flex-direction: column; gap: 5px; }
        .profile-data-card h4 { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .profile-data-card p { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }

        /* Toast / Notifications */
        .toast-container { position: fixed; top: 30px; right: 30px; z-index: 99999; display: flex; flex-direction: column; gap: 15px; }
        .toast {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 20px 25px; border-radius: var(--radius-sm); box-shadow: var(--shadow-float);
            display: flex; align-items: flex-start; gap: 15px; width: 350px;
            transform: translateX(120%); animation: toastIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            border-left: 6px solid var(--primary);
        }
        @keyframes toastIn { to { transform: translateX(0); } }
        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        .toast.warning { border-left-color: #f59e0b; }
        .toast i { font-size: 1.5rem; margin-top: 2px; }
        .toast.success i { color: #10b981; }
        .toast.error i { color: #ef4444; }
        .toast-content { flex: 1; }
        .toast-title { font-weight: 800; font-size: 1rem; margin-bottom: 3px; color: var(--text-main); }
        .toast-message { font-size: 0.9rem; color: var(--text-muted); line-height: 1.4; }

        /* Mobile Adjustments */
        .menu-toggle {
            position: fixed; bottom: 25px; right: 25px; z-index: 1000;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--primary); color: white; border: none;
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 10px 25px rgba(4,120,87,0.4);
            display: none; align-items: center; justify-content: center; transition: var(--transition);
        }
        .menu-toggle:active { transform: scale(0.9); }
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            z-index: 900; opacity: 0; visibility: hidden; transition: var(--transition);
        }

        @media (max-width: 992px) {
            .page-container { padding: 25px 20px; }
            .hero-dashboard { flex-direction: column; text-align: center; gap: 30px; padding: 30px 20px; }
            .hero-text p { margin: 0 auto; }
            .sidebar { display: none; position: fixed; top: 0; left: -300px; bottom: 0; width: 280px; z-index: 950; background: white; box-shadow: var(--shadow-float); transition: var(--transition); padding-top: 80px; }
            .sidebar.active { left: 0; display: flex; }
            .sidebar-overlay.active { opacity: 1; visibility: visible; }
            .menu-toggle { display: flex; }
            .topbar { padding: 15px 20px; }
            .datetime { display: none; } /* Hide on small screens for space */
        }
        
        /* =========================================================
           MOBILE OPTIMIZATION (iPhone & Android) - REVISI 2
           ========================================================= */
        @media (max-width: 576px) {
            .login-overlay { 
                padding: 15px; 
                /* Penggunaan place-items: center (grid) mengatasi masalah pemotongan form saat keyboard muncul */
            }
            .login-card { 
                padding: 30px 25px; 
                border-radius: 24px;
                max-width: 100%;
                margin: auto; /* Memaksa kartu berada di tengah dengan mulus */
            }
            .login-logo {
                width: 70px; height: 70px; margin-bottom: 15px; padding: 8px;
            }
            .login-card h2 { font-size: 1.55rem; margin-bottom: 4px; }
            .login-card p { font-size: 0.9rem; margin-bottom: 25px; }
            
            .input-group { margin-bottom: 15px; }
            .input-group input { 
                padding: 13px 15px 13px 45px; 
                font-size: 0.95rem; 
                border-radius: 10px;
            }
            .input-group i { left: 15px; font-size: 1rem; }
            .toggle-pass { right: 15px !important; }
            
            .btn-login { padding: 13px; font-size: 1rem; margin-top: 5px; border-radius: 10px; }
            
            .login-footer { margin-top: 22px; gap: 10px; }
            .login-footer a { font-size: 0.85rem; }

            /* Konten Portal */
            .form-row { grid-template-columns: 1fr; }
            .profile-hero { flex-direction: column; text-align: center; }
            .toast-container { top: 15px; right: 15px; left: 15px; }
            .toast { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- ============================================ -->
    <!-- PRELOADER -->
    <!-- ============================================ -->
    <div class="preloader" id="preloader">
        <div class="spinner-logo">
            <div class="spinner-ring"></div>
            <img src="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png" alt="Loading">
        </div>
        <h3 style="margin-top: 25px; color: var(--primary-dark);">Memuat Portal...</h3>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================ -->
    <!-- LOGIN OVERLAY -->
    <!-- ============================================ -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-logo">
                <img src="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png" alt="SMAN 68" style="width:100%; height:100%; object-fit:contain;">
            </div>
            <h2>Portal Siswa</h2>
            <p>SMAN 68 Jakarta - Sistem Akademik Terpadu</p>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="loginNIS" placeholder="Nomor Induk Sekolah (NIS)" required autocomplete="off">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Kata Sandi" required>
                    <i class="fas fa-eye toggle-pass" id="loginPassToggle"></i>
                </div>
                <button type="submit" class="btn-primary btn-login" style="width:100%">
                    Masuk ke Portal <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div class="login-footer" style="flex-direction: column; gap: 12px; align-items: center;">
                <a href="./daftar-siswa-sman-68.html" style="font-size: 0.95rem;">Belum punya akun? Daftarkan sekarang</a>
                <a href="./sman68.html" style="font-size: 0.9rem;"><i class="fas fa-globe"></i> Website Utama</a>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MAIN PORTAL -->
    <!-- ============================================ -->
    <div class="main-portal" id="mainPortal" style="display:none;">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <div class="topbar-logo">
                    <img src="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png" alt="Logo" style="width:100%; height:100%; object-fit:contain;">
                </div>
                <div class="topbar-brand">
                    <h1>Portal Siswa</h1>
                    <span>SMAN 68 Jakarta</span>
                </div>
            </div>
            <div class="topbar-right">
                <div class="datetime" id="datetime"></div>
                <div class="user-profile-btn" onclick="loadPage('profil')">
                    <div class="user-avatar-small" id="topAvatar">S</div>
                    <span style="font-weight:700; color:var(--primary-dark);" id="topNama">Siswa</span>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-wrapper">
            <!-- Mobile Overlay -->
            <div class="sidebar-overlay" id="sidebarOverlay"></div>
            
            <!-- Sidebar -->
            <nav class="sidebar" id="sidebar">
                <div class="sidebar-title">Menu Utama</div>
                <a href="#" class="sidebar-item active" data-page="dashboard">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="#" class="sidebar-item" data-page="jadwal">
                    <i class="fas fa-calendar-alt"></i> Jadwal Pelajaran
                </a>
                <a href="#" class="sidebar-item" data-page="absensi">
                    <i class="fas fa-clipboard-check"></i> Form Absensi
                </a>
                <a href="#" class="sidebar-item" data-page="agenda">
                    <i class="fas fa-book-open"></i> Agenda Pribadi
                </a>
                
                <div class="sidebar-title" style="margin-top: 20px;">Laporan & Akun</div>
                <a href="#" class="sidebar-item" data-page="riwayat">
                    <i class="fas fa-history"></i> Riwayat Absensi
                </a>
                <a href="#" class="sidebar-item" data-page="profil">
                    <i class="fas fa-user-circle"></i> Profil Saya
                </a>
                
                <a href="#" class="sidebar-item sidebar-logout" id="logoutBtn" style="margin-top: 30px;">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </a>
            </nav>

            <!-- Page Container -->
            <main class="page-container" id="pageContainer"></main>
        </div>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

    <script>
        // ==========================================
        // KONFIGURASI FIREBASE (Sesuai File Asli)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDAcKcg3alPOTH3FFGelYmsW7jcMMe2PLI",
            authDomain: "upnvjdatsystem.firebaseapp.com",
            projectId: "upnvjdatsystem",
            storageBucket: "upnvjdatsystem.firebasestorage.app",
            messagingSenderId: "57095309946",
            appId: "1:57095309946:web:b0e9f3f86380d549ffc9c3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==========================================
        // VARIABEL GLOBAL
        // ==========================================
        let currentSiswa = null;
        let currentPage = 'dashboard';
        let jadwalData = []; // Sekarang menggunakan array dinamis dari server
        let agendaData = []; // Sekarang menggunakan array dinamis dari server

        // ==========================================
        // SISTEM TOAST (PREMIUM)
        // ==========================================
        function showToast(type, title, message) {
            const container = document.getElementById('toastContainer');
            const icons = { success: 'check-circle', error: 'times-circle', warning: 'exclamation-triangle', info: 'info-circle' };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${icons[type] || 'bell'}"></i>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => { 
                toast.style.transform = 'translateX(120%)'; 
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400); 
            }, 4000);
        }

        // Hilangkan Preloader
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('preloader').classList.add('hide'), 800);
        });

        // ==========================================
        // LOGIKA LOGIN & LOGOUT
        // ==========================================
        document.getElementById('loginPassToggle').addEventListener('click', function() {
            const input = document.getElementById('loginPassword');
            if(input.type === 'password') {
                input.type = 'text';
                this.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                this.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nis = document.getElementById('loginNIS').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = e.target.querySelector('button');
            
            if (!nis || !password) { showToast('warning', 'Perhatian', 'NIS dan Kata Sandi wajib diisi!'); return; }
            
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Memeriksa...';
            btn.disabled = true;

            try {
                const snapshot = await db.collection('siswa').where('nis', '==', nis).where('password', '==', password).get();
                if (snapshot.empty) { 
                    showToast('error', 'Akses Ditolak', 'NIS atau Kata Sandi tidak cocok.'); 
                    btn.innerHTML = 'Masuk ke Portal <i class="fas fa-arrow-right"></i>';
                    btn.disabled = false;
                    return; 
                }
                
                const doc = snapshot.docs[0];
                const data = doc.data();
                
                if (data.status === 'pending' || data.status === 'proses') {
                    showToast('warning', 'Menunggu Verifikasi', 'Akun Anda sedang ditinjau oleh operator.');
                } else if (data.status === 'rejected') {
                    showToast('error', 'Akun Ditolak', 'Pendaftaran ditolak. Hubungi bagian Tata Usaha.');
                } else if (data.status === 'approved') {
                    currentSiswa = { id: doc.id, ...data };
                    masukPortal();
                }
            } catch (error) { 
                showToast('error', 'Koneksi Bermasalah', 'Gagal terhubung ke database server.'); 
            } finally {
                if(!currentSiswa) {
                    btn.innerHTML = 'Masuk ke Portal <i class="fas fa-arrow-right"></i>';
                    btn.disabled = false;
                }
            }
        });

        function masukPortal() {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainPortal').style.display = 'flex';
            
            // Set Header Info
            const namaDepan = currentSiswa.nama.split(' ')[0];
            const inisial = currentSiswa.nama.substring(0,1).toUpperCase();
            document.getElementById('topNama').textContent = namaDepan;
            document.getElementById('topAvatar').textContent = inisial;
            
            initPortal();
            showToast('success', 'Berhasil Masuk', `Selamat datang kembali, ${namaDepan}!`);
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            currentSiswa = null;
            document.getElementById('loginOverlay').style.display = 'grid'; // Grid untuk login
            document.getElementById('mainPortal').style.display = 'none';
            document.getElementById('loginNIS').value = '';
            document.getElementById('loginPassword').value = '';
            
            const btn = document.querySelector('#loginForm button');
            btn.innerHTML = 'Masuk ke Portal <i class="fas fa-arrow-right"></i>';
            btn.disabled = false;
            
            closeMobileMenu();
        });

        // ==========================================
        // INISIALISASI & NAVIGASI
        // ==========================================
        function initPortal() {
            updateDateTime();
            setInterval(updateDateTime, 1000);
            setupSidebar();
            loadPage('dashboard');
        }

        function updateDateTime() {
            const now = new Date();
            const opsi = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('datetime').textContent = now.toLocaleDateString('id-ID', opsi).replace(/\./g, ':');
        }

        // Mobile Menu Logic
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const menuToggle = document.getElementById('menuToggle');

        function toggleMobileMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
        function closeMobileMenu() {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        menuToggle.addEventListener('click', toggleMobileMenu);
        overlay.addEventListener('click', closeMobileMenu);

        function setupSidebar() {
            document.querySelectorAll('.sidebar-item[data-page]').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    loadPage(item.dataset.page);
                    if(window.innerWidth <= 992) closeMobileMenu();
                });
            });
        }

        function loadPage(page) {
            currentPage = page;
            const container = document.getElementById('pageContainer');
            
            // Sync sidebar active state if called programmatically
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            const activeItem = document.querySelector(`.sidebar-item[data-page="${page}"]`);
            if(activeItem) activeItem.classList.add('active');

            window.scrollTo({top: 0, behavior: 'smooth'});

            switch(page) {
                case 'dashboard': loadDashboard(container); break;
                case 'jadwal': loadJadwal(container); break;
                case 'absensi': loadAbsensi(container); break;
                case 'agenda': loadAgenda(container); break;
                case 'riwayat': loadRiwayat(container); break;
                case 'profil': loadProfil(container); break;
            }
        }

        // ==========================================
        // KONTEN HALAMAN (INJEKSI HTML)
        // ==========================================

        // 1. Dashboard (Premium Hero Banner)
        function loadDashboard(container) {
            const h = new Date().getHours();
            let sapaan = 'Selamat Malam';
            if(h >= 4 && h < 11) sapaan = 'Selamat Pagi';
            else if(h >= 11 && h < 15) sapaan = 'Selamat Siang';
            else if(h >= 15 && h < 18) sapaan = 'Selamat Sore';

            const inisial = currentSiswa.nama.substring(0, 2).toUpperCase();
            
            // Tentukan hari ini (Default Senin jika Sabtu/Minggu)
            const hariNames = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
            const today = new Date();
            let dayName = hariNames[today.getDay()];
            if(dayName === 'Minggu' || dayName === 'Sabtu') dayName = 'Senin'; 
            
            container.innerHTML = `
                <div class="hero-dashboard">
                    <div class="hero-text">
                        <h2>${sapaan}, ${currentSiswa.nama.split(' ')[0]}!</h2>
                        <p>Selamat datang di Portal Akademik Terpadu SMAN 68 Jakarta. Pantau jadwal, absensi, dan agenda Anda dengan mudah.</p>
                    </div>
                    <div class="hero-profile">
                        <div class="hero-avatar">${inisial}</div>
                        <div>
                            <div style="font-size:0.9rem; color:var(--accent); font-weight:700;">${currentSiswa.nis}</div>
                            <div style="font-size:1.2rem; font-weight:800; margin-bottom:2px;">Kelas ${currentSiswa.kelas}</div>
                            <div style="font-size:0.9rem; opacity:0.9;">${currentSiswa.jurusan}</div>
                        </div>
                    </div>
                </div>
                
                <div class="form-row" style="margin-bottom:30px; align-items: start;">
                    <!-- Kartu Jadwal Hari Ini -->
                    <div class="card" style="margin:0; padding: 25px;">
                        <div class="card-header" style="margin-bottom:15px; padding-bottom:15px; border-bottom:1px solid var(--border-light);">
                            <div class="card-title">
                                <div class="card-title-icon"><i class="fas fa-calendar-alt"></i></div>
                                <h3>Jadwal Hari Ini (${dayName})</h3>
                            </div>
                        </div>
                        <div id="dashboardJadwalList" style="max-height: 280px; overflow-y: auto; padding-right:5px;">
                            <div style="text-align:center; padding:20px; color:var(--text-muted);">
                                <i class="fas fa-spinner fa-spin" style="font-size:1.5rem; margin-bottom:10px;"></i>
                                <p>Menyinkronkan jadwal...</p>
                            </div>
                        </div>
                        <button class="btn-secondary" style="width:100%; margin-top:20px; padding:12px; border-radius:8px; border:2px solid var(--border-light); font-weight:700; cursor:pointer;" onclick="loadPage('jadwal')">
                            Kelola Jadwal Lengkap
                        </button>
                    </div>
                    
                    <!-- Kartu Status Absensi -->
                    <div class="card" style="margin:0; padding: 25px;">
                        <div class="card-header" style="margin-bottom:15px; padding-bottom:15px; border-bottom:1px solid var(--border-light);">
                            <div class="card-title">
                                <div class="card-title-icon" style="background:#e0e7ff; color:#4f46e5;"><i class="fas fa-user-check"></i></div>
                                <h3>Status Absensi Hari Ini</h3>
                            </div>
                        </div>
                        <div id="dashboardAbsensiContent" style="text-align:center; padding:30px 20px;">
                            <i class="fas fa-spinner fa-spin" style="font-size:2.5rem; color:var(--primary);"></i>
                            <p style="margin-top:15px; color:var(--text-muted); font-size:0.95rem; font-weight:600;">Memuat data absensi...</p>
                        </div>
                    </div>
                </div>
            `;
            
            fetchDashboardJadwal(dayName);
            checkAbsensiHariIni();
        }

        async function fetchDashboardJadwal(dayName) {
            const list = document.getElementById('dashboardJadwalList');
            if(!list) return;

            const key = `${currentSiswa.id}_${dayName}`;
            try {
                const docRef = await db.collection('jadwalSiswa').doc(key).get();
                let savedJadwal = docRef.exists ? (docRef.data().jadwal || []) : [];
                
                if(savedJadwal.length === 0) {
                    list.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted); font-size:0.9rem;">Belum ada jadwal yang diinput untuk hari ${dayName}.</div>`;
                } else {
                    list.innerHTML = savedJadwal.map(j => `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid var(--border-light);">
                            <div>
                                <div style="font-weight:700; color:var(--text-main);">${j.mapel}</div>
                                <div style="font-size:0.8rem; color:var(--text-muted);"><i class="fas fa-chalkboard-teacher"></i> ${j.guru || '-'}</div>
                            </div>
                            <div style="font-size:0.85rem; font-weight:800; color:var(--primary); background:#f1f5f9; padding:5px 10px; border-radius:6px;">${j.jamMulai || '--:--'}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                list.innerHTML = `<div style="text-align:center; color:#ef4444; padding:10px;">Gagal memuat jadwal dari server.</div>`;
            }
        }

        // Fungsi Cek Absen Harian untuk Dashboard
        async function checkAbsensiHariIni() {
            const todayDate = new Date().toISOString().split('T')[0];
            const content = document.getElementById('dashboardAbsensiContent');
            if(!content) return;
            
            try {
                const snapshot = await db.collection('absensiSiswa')
                    .where('siswaId', '==', currentSiswa.id)
                    .where('tanggal', '==', todayDate)
                    .get();
                    
                if(snapshot.empty) {
                    content.innerHTML = `
                        <div style="padding:25px; background:#fef2f2; border-radius:12px; margin-bottom:20px; border:1px solid #fecaca;">
                            <i class="fas fa-exclamation-circle" style="color:#dc2626; font-size:3rem; margin-bottom:15px;"></i>
                            <h4 style="color:#dc2626; font-size:1.2rem; margin-bottom:5px;">Belum Mengisi Absen</h4>
                            <p style="font-size:0.9rem; color:#7f1d1d;">Anda belum melakukan presensi kehadiran untuk hari ini.</p>
                        </div>
                        <button class="btn-primary" style="width:100%; justify-content:center; padding:14px; font-size:1.05rem;" onclick="loadPage('absensi')">
                            Isi Absensi Sekarang <i class="fas fa-arrow-right"></i>
                        </button>
                    `;
                } else {
                    const data = snapshot.docs[0].data();
                    let icon, color, bg;
                    if(data.status === 'hadir') { icon = 'check-circle'; color = '#059669'; bg = '#d1fae5'; }
                    else if(data.status === 'sakit') { icon = 'procedures'; color = '#dc2626'; bg = '#fee2e2'; }
                    else if(data.status === 'izin') { icon = 'envelope-open-text'; color = '#d97706'; bg = '#fef3c7'; }
                    else { icon = 'award'; color = '#2563eb'; bg = '#dbeafe'; }
                    
                    const timeString = data.timestamp ? data.timestamp.toDate().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) : '-';
                    
                    content.innerHTML = `
                        <div style="padding:25px; background:${bg}; border-radius:12px; border:2px solid ${color};">
                            <i class="fas fa-${icon}" style="color:${color}; font-size:3rem; margin-bottom:15px;"></i>
                            <h4 style="color:${color}; font-size:1.4rem; text-transform:uppercase; margin-bottom:8px;">${data.status}</h4>
                            <p style="font-size:0.95rem; color:var(--text-main); font-weight:700;">Direkam pada: ${timeString} WIB</p>
                            ${data.status !== 'hadir' ? `<p style="font-size:0.85rem; color:var(--text-muted); margin-top:8px; font-style:italic;">"${data.keterangan}"</p>` : ''}
                        </div>
                        <button class="btn-secondary" style="width:100%; margin-top:20px; padding:12px; border-radius:8px; border:2px solid var(--border-light); font-weight:700; cursor:pointer;" onclick="loadPage('riwayat')">
                            Lihat Riwayat Lengkap
                        </button>
                    `;
                }
            } catch(e) {
                content.innerHTML = `
                    <div style="padding:25px;">
                        <i class="fas fa-wifi" style="color:var(--text-muted); font-size:3rem; margin-bottom:15px; opacity:0.5;"></i>
                        <p style="color:#ef4444; font-size:0.95rem; font-weight:600;">Gagal memuat status absensi. Silakan periksa koneksi internet Anda.</p>
                    </div>`;
            }
        }

        // 2. Jadwal Pelajaran (Sekarang tersimpan di Firestore)
        function loadJadwal(container) {
            const hari = ['Senin','Selasa','Rabu','Kamis','Jumat'];
            const today = new Date().getDay();
            const todayIdx = (today === 0 || today === 6) ? 0 : today - 1;
            
            let tabsHtml = hari.map((h, i) => `<button class="chip ${i === todayIdx ? 'active' : ''}" data-hari="${h}" onclick="switchJadwalHari('${h}')">${h}</button>`).join('');
            
            container.innerHTML = `
                <div class="page-header">
                    <h2>Jadwal Pelajaran</h2>
                    <p>Atur dan pantau jadwal mata pelajaran Anda selama sepekan.</p>
                </div>
                
                <div class="card">
                    <div class="filter-chip">${tabsHtml}</div>
                    <div id="jadwalList" style="min-height: 200px;">
                        <div style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-spin fa-2x"></i><p style="margin-top:10px;">Mengambil data dari server...</p></div>
                    </div>
                    <hr style="border:0; border-top:1px solid var(--border-light); margin:25px 0;">
                    <button class="btn-primary" onclick="addJadwal()"><i class="fas fa-plus-circle"></i> Tambah Jadwal Baru</button>
                </div>
                <div id="jadwalForm" style="display:none; animation: fadeUp 0.4s ease;"></div>
            `;
            loadJadwalHari(hari[todayIdx]);
        }

        window.switchJadwalHari = function(hari) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            document.querySelector(`[data-hari="${hari}"]`)?.classList.add('active');
            loadJadwalHari(hari);
        }

        async function loadJadwalHari(hari) {
            const key = `${currentSiswa.id}_${hari}`;
            const list = document.getElementById('jadwalList');
            
            list.innerHTML = '<div style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary);"></i><p style="margin-top:10px; color:var(--text-muted);">Menyinkronkan dengan server...</p></div>';

            try {
                const doc = await db.collection('jadwalSiswa').doc(key).get();
                jadwalData = doc.exists ? (doc.data().jadwal || []) : [];
                
                if (jadwalData.length === 0) {
                    list.innerHTML = `
                        <div style="text-align:center; padding:40px 20px; color:var(--text-muted);">
                            <i class="fas fa-calendar-times" style="font-size:3rem; margin-bottom:15px; opacity:0.5;"></i>
                            <h4>Jadwal Kosong</h4>
                            <p>Belum ada jadwal yang ditambahkan untuk hari ${hari}.</p>
                        </div>`;
                    return;
                }
                
                list.innerHTML = jadwalData.map((j, idx) => {
                    const now = new Date();
                    const [endHour, endMin] = (j.jamSelesai || '').split(':').map(Number);
                    const isDone = now.getHours() > endHour || (now.getHours() === endHour && now.getMinutes() >= (endMin || 0));
                    
                    return `
                        <div class="jadwal-item ${isDone ? 'done' : ''}">
                            <div class="jadwal-time">${j.jamMulai || '--:--'} <br><span style="font-size:0.8rem; opacity:0.7; font-weight:600;">s/d</span><br> ${j.jamSelesai || '--:--'}</div>
                            <div class="jadwal-info">
                                <div class="jadwal-mapel">${j.mapel}</div>
                                <div class="jadwal-guru"><i class="fas fa-chalkboard-teacher"></i> ${j.guru || 'Belum ditentukan'}</div>
                                ${isDone ? '<div style="margin-top:8px; font-size:0.8rem; color:#059669; font-weight:700;"><i class="fas fa-check-circle"></i> Selesai</div>' : ''}
                            </div>
                            <div style="display:flex; gap:10px;">
                                <button class="action-btn btn-icon-delete" onclick="deleteJadwal(${idx})" title="Hapus"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>`;
                }).join('');
            } catch(e) {
                list.innerHTML = `<div style="text-align:center; color:#ef4444; padding:20px;">Gagal mengambil data dari server. Periksa koneksi internet Anda.</div>`;
            }
        }

        window.addJadwal = function() {
            const form = document.getElementById('jadwalForm');
            form.style.display = 'block';
            form.innerHTML = `
                <div class="card" style="border-top: 4px solid var(--primary);">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-title-icon"><i class="fas fa-edit"></i></div>
                            <h3>Input Jadwal Baru</h3>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Mata Pelajaran <span style="color:#ef4444">*</span></label><input type="text" id="newMapel" class="form-input" placeholder="Contoh: Matematika Peminatan"></div>
                        <div class="form-group"><label>Guru Pengajar</label><input type="text" id="newGuru" class="form-input" placeholder="Nama Guru"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Jam Mulai</label><input type="time" id="newJamMulai" class="form-input"></div>
                        <div class="form-group"><label>Jam Selesai</label><input type="time" id="newJamSelesai" class="form-input"></div>
                    </div>
                    <div style="margin-top:20px; display:flex; gap:15px;">
                        <button class="btn-primary" onclick="saveJadwal()" id="btnSimpanJadwal"><i class="fas fa-save"></i> Simpan Jadwal</button>
                        <button class="btn-primary btn-secondary" onclick="document.getElementById('jadwalForm').style.display='none'">Batal</button>
                    </div>
                </div>`;
            form.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        window.saveJadwal = async function() {
            const mapel = document.getElementById('newMapel').value.trim();
            const guru = document.getElementById('newGuru').value.trim();
            const jamMulai = document.getElementById('newJamMulai').value;
            const jamSelesai = document.getElementById('newJamSelesai').value;
            if (!mapel) { showToast('error', 'Validasi Gagal', 'Mata pelajaran wajib diisi!'); return; }
            
            const btn = document.getElementById('btnSimpanJadwal');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
            btn.disabled = true;

            const hari = document.querySelector('.chip.active')?.dataset.hari || 'Senin';
            const key = `${currentSiswa.id}_${hari}`;
            
            jadwalData.push({ mapel, guru, jamMulai, jamSelesai });
            jadwalData.sort((a,b) => (a.jamMulai || '00:00').localeCompare(b.jamMulai || '00:00'));
            
            try {
                await db.collection('jadwalSiswa').doc(key).set({ jadwal: jadwalData });
                document.getElementById('jadwalForm').style.display = 'none';
                loadJadwalHari(hari);
                showToast('success', 'Berhasil', 'Jadwal berhasil ditambahkan ke database awan.');
            } catch(e) {
                showToast('error', 'Gagal', 'Terjadi kesalahan saat menyimpan ke database.');
                btn.innerHTML = '<i class="fas fa-save"></i> Simpan Jadwal';
                btn.disabled = false;
            }
        }

        window.deleteJadwal = async function(idx) {
            if(confirm('Yakin ingin menghapus jadwal ini secara permanen?')) {
                const hari = document.querySelector('.chip.active')?.dataset.hari || 'Senin';
                const key = `${currentSiswa.id}_${hari}`;
                jadwalData.splice(idx, 1);
                
                try {
                    await db.collection('jadwalSiswa').doc(key).set({ jadwal: jadwalData });
                    loadJadwalHari(hari);
                    showToast('info', 'Dihapus', 'Jadwal telah dihapus dari database.');
                } catch (e) {
                    showToast('error', 'Gagal', 'Tidak dapat menghapus dari database.');
                }
            }
        }

        // 3. Form Absensi
        function loadAbsensi(container) {
            container.innerHTML = `
                <div class="page-header">
                    <h2>Form Absensi Siswa</h2>
                    <p>Lengkapi formulir kehadiran untuk hari ini beserta bukti pendukung.</p>
                </div>
                <div class="card">
                    <h3 style="margin-bottom:20px; font-size:1.1rem;">Status Kehadiran</h3>
                    <div class="status-options">
                        <div class="status-card hadir" data-status="hadir" onclick="selectStatus(this)"><div class="status-icon"><i class="fas fa-check"></i></div><h4>Hadir</h4></div>
                        <div class="status-card sakit" data-status="sakit" onclick="selectStatus(this)"><div class="status-icon"><i class="fas fa-procedures"></i></div><h4>Sakit</h4></div>
                        <div class="status-card izin" data-status="izin" onclick="selectStatus(this)"><div class="status-icon"><i class="fas fa-envelope-open-text"></i></div><h4>Izin</h4></div>
                        <div class="status-card dispensasi" data-status="dispensasi" onclick="selectStatus(this)"><div class="status-icon"><i class="fas fa-award"></i></div><h4>Dispensasi</h4></div>
                    </div>
                    
                    <div class="form-group">
                        <label>Link Lampiran Bukti (G-Drive / Foto) <span style="color:#ef4444">*</span></label>
                        <input type="url" id="absensiUrl" class="form-input" placeholder="https://drive.google.com/file/d/...">
                        <p style="font-size:0.8rem; color:var(--text-muted); margin-top:5px;"><i class="fas fa-info-circle"></i> Wajib diisi untuk bukti kehadiran / surat dokter / surat izin.</p>
                    </div>
                    
                    <div class="form-group" id="keteranganGroup" style="display:none;">
                        <label>Keterangan Tambahan</label>
                        <textarea id="absensiKeterangan" class="form-input" rows="3" placeholder="Tuliskan keterangan lebih lanjut jika sakit, izin, atau dispensasi..."></textarea>
                    </div>
                    
                    <hr style="border:0; border-top:1px solid var(--border-light); margin:25px 0;">
                    <button class="btn-primary" id="submitAbsensiBtn" onclick="submitAbsensi()" style="width:100%; justify-content:center; padding:18px; font-size:1.1rem;">
                        <i class="fas fa-paper-plane"></i> Kirim Data Absensi
                    </button>
                </div>`;
            
            let selectedStatus = '';
            window.selectStatus = function(el) {
                document.querySelectorAll('.status-card').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
                selectedStatus = el.dataset.status;
                // Munculkan text area jika bukan hadir
                const ketGroup = document.getElementById('keteranganGroup');
                if(selectedStatus === 'hadir') {
                    ketGroup.style.display = 'none';
                } else {
                    ketGroup.style.display = 'block';
                    ketGroup.style.animation = 'fadeUp 0.3s ease';
                }
            };

            window.submitAbsensi = async function() {
                if (!selectedStatus) { showToast('error', 'Peringatan', 'Silakan pilih status kehadiran terlebih dahulu!'); return; }
                const url = document.getElementById('absensiUrl').value.trim();
                if (!url) { showToast('error', 'Peringatan', 'Link bukti wajib diisi!'); return; }
                const ket = document.getElementById('absensiKeterangan').value.trim();
                if (selectedStatus !== 'hadir' && !ket) { showToast('error', 'Peringatan', 'Keterangan wajib diisi untuk status selain hadir!'); return; }
                
                const btn = document.getElementById('submitAbsensiBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses Pengiriman...';
                btn.disabled = true;

                const now = new Date();
                try {
                    await db.collection('absensiSiswa').add({
                        siswaId: currentSiswa.id, 
                        nama: currentSiswa.nama, 
                        nisn: currentSiswa.nis, 
                        kelas: currentSiswa.kelas,
                        jurusan: currentSiswa.jurusan, 
                        status: selectedStatus, 
                        keterangan: ket || '-', 
                        buktiUrl: url,
                        tanggal: now.toISOString().split('T')[0], 
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    const jam = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                    const tepatWaktu = now.getHours() < 6 || (now.getHours() === 6 && now.getMinutes() <= 30);
                    
                    if(selectedStatus === 'hadir') {
                        if(tepatWaktu) showToast('success', 'Absensi Berhasil', `Tepat waktu. Terima kasih! Waktu: ${jam}`);
                        else showToast('warning', 'Absensi Diterima (Terlambat)', `Anda tercatat masuk pukul ${jam}.`);
                    } else {
                        showToast('success', 'Data Diterima', 'Laporan izin/sakit/dispensasi berhasil dikirim.');
                    }
                    
                    // Reset Form
                    document.getElementById('absensiUrl').value = '';
                    document.getElementById('absensiKeterangan').value = '';
                    document.querySelectorAll('.status-card').forEach(c => c.classList.remove('active'));
                    document.getElementById('keteranganGroup').style.display = 'none';
                    selectedStatus = '';
                    
                } catch (e) { 
                    showToast('error', 'Kegagalan Server', 'Gagal mengirim data. Coba beberapa saat lagi.'); 
                } finally {
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Kirim Data Absensi';
                    btn.disabled = false;
                }
            };
        }

        // 4. Agenda Pribadi (Sekarang tersimpan di Firestore)
        async function loadAgenda(container) {
            container.innerHTML = `
                <div class="page-header">
                    <h2>Agenda Pribadi</h2>
                    <p>Kalender pintar untuk mencatat tugas, ulangan, atau kegiatan sekolah.</p>
                </div>
                <div style="text-align:center; padding:50px;">
                    <i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary);"></i>
                    <p style="margin-top:10px; color:var(--text-muted);">Menyinkronkan agenda dari server...</p>
                </div>
            `;

            try {
                const doc = await db.collection('agendaSiswa').doc(currentSiswa.id).get();
                agendaData = doc.exists ? (doc.data().kegiatan || []) : [];
                renderAgendaUI(container);
            } catch (e) {
                container.innerHTML = `<div style="text-align:center; padding:30px; color:#ef4444;">Gagal memuat agenda dari database.</div>`;
            }
        }

        function renderAgendaUI(container) {
            const now = new Date();
            const bulan = now.getMonth();
            const tahun = now.getFullYear();
            const hariIni = now.getDate();
            const hariPertama = new Date(tahun, bulan, 1).getDay();
            const totalHari = new Date(tahun, bulan + 1, 0).getDate();
            const namaHari = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];

            let kalenderHtml = namaHari.map(h => `<div class="kalender-day-name">${h}</div>`).join('');
            for (let i = 0; i < hariPertama; i++) kalenderHtml += '<div class="kalender-day empty"></div>';
            for (let d = 1; d <= totalHari; d++) {
                const dateStr = `${tahun}-${String(bulan+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = d === hariIni ? ' today' : '';
                const hasAgenda = agendaData.some(a => a.tanggal === dateStr) ? ' has-agenda' : '';
                kalenderHtml += `<div class="kalender-day${isToday}${hasAgenda}" onclick="showAgendaForm('${dateStr}')">${d}</div>`;
            }
            
            const monthName = now.toLocaleString('id-ID', { month: 'long' });
            
            container.innerHTML = `
                <div class="page-header">
                    <h2>Agenda Pribadi</h2>
                    <p>Kalender pintar untuk mencatat tugas, ulangan, atau kegiatan sekolah.</p>
                </div>
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <div class="card-title-icon"><i class="fas fa-calendar-alt"></i></div>
                            <h3>${monthName} ${tahun}</h3>
                        </div>
                    </div>
                    <div class="kalender-grid">${kalenderHtml}</div>
                </div>
                <div id="agendaDetail"></div>
            `;
            
            window.showAgendaForm = function(tanggal) {
                const detail = document.getElementById('agendaDetail');
                const tglFormat = new Date(tanggal).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                
                const todaysAgenda = agendaData.filter(a => a.tanggal === tanggal);
                let existingHtml = '';
                
                if(todaysAgenda.length > 0) {
                    existingHtml = `
                        <div style="margin-bottom:20px;">
                            <h4 style="margin-bottom:15px; color:var(--primary-dark);">Daftar Kegiatan:</h4>
                            ${todaysAgenda.map((a, idx) => `
                                <div style="display:flex; justify-content:space-between; align-items:center; background:#f8fafc; padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid var(--border-light);">
                                    <div>
                                        <div style="font-weight:700; color:var(--text-main); font-size:1.05rem;">${a.judul}</div>
                                        <div style="font-size:0.85rem; color:var(--text-muted);"><i class="far fa-clock"></i> Pukul: ${a.jam || 'Seharian'}</div>
                                    </div>
                                    <button class="action-btn btn-icon-delete" onclick="deleteAgenda('${tanggal}', ${idx})"><i class="fas fa-trash"></i></button>
                                </div>
                            `).join('')}
                        </div>
                        <hr style="border:0; border-top:1px solid var(--border-light); margin:20px 0;">
                    `;
                }

                detail.innerHTML = `
                    <div class="card" style="border-top: 4px solid var(--accent); animation: fadeUp 0.4s ease;">
                        <h3 style="margin-bottom:20px;">Detail Tanggal: <span style="color:var(--primary);">${tglFormat}</span></h3>
                        ${existingHtml}
                        
                        <h4 style="margin-bottom:15px; color:var(--primary-dark);">+ Tambah Kegiatan Baru</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Nama Kegiatan</label>
                                <input type="text" id="agendaJudul" class="form-input" placeholder="Contoh: Ulangan Fisika, Latihan Futsal">
                            </div>
                            <div class="form-group">
                                <label>Waktu (Opsional)</label>
                                <input type="time" id="agendaJam" class="form-input">
                            </div>
                        </div>
                        <button class="btn-primary" onclick="saveAgenda('${tanggal}')" style="margin-top:10px;" id="btnSimpanAgenda">
                            <i class="fas fa-save"></i> Simpan Agenda
                        </button>
                    </div>`;
                
                detail.scrollIntoView({ behavior: 'smooth', block: 'end' });
            };
            
            window.saveAgenda = async function(tanggal) {
                const judul = document.getElementById('agendaJudul').value.trim();
                const jam = document.getElementById('agendaJam').value;
                if (!judul) { showToast('error', 'Peringatan', 'Nama kegiatan tidak boleh kosong!'); return; }
                
                const btn = document.getElementById('btnSimpanAgenda');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
                btn.disabled = true;

                agendaData.push({ tanggal, judul, jam });
                
                try {
                    await db.collection('agendaSiswa').doc(currentSiswa.id).set({ kegiatan: agendaData });
                    showToast('success', 'Berhasil', 'Kegiatan disimpan di database awan.');
                    renderAgendaUI(document.getElementById('pageContainer'));
                    showAgendaForm(tanggal);
                } catch(e) {
                    showToast('error', 'Gagal', 'Terjadi masalah jaringan saat menyimpan agenda.');
                    btn.innerHTML = '<i class="fas fa-save"></i> Simpan Agenda';
                    btn.disabled = false;
                }
            };

            window.deleteAgenda = async function(tanggal, localIdx) {
                if(confirm('Hapus kegiatan ini secara permanen?')) {
                    let filtered = agendaData.filter(a => a.tanggal === tanggal);
                    let toDelete = filtered[localIdx];
                    let actualIdx = agendaData.indexOf(toDelete);
                    
                    if(actualIdx > -1) {
                        agendaData.splice(actualIdx, 1);
                        try {
                            await db.collection('agendaSiswa').doc(currentSiswa.id).set({ kegiatan: agendaData });
                            showToast('info', 'Dihapus', 'Kegiatan dihapus dari kalender awan.');
                            renderAgendaUI(document.getElementById('pageContainer'));
                            showAgendaForm(tanggal);
                        } catch(e) {
                            showToast('error', 'Gagal', 'Gagal menghapus kegiatan.');
                        }
                    }
                }
            };
        }

        // 5. Riwayat Absensi
        async function loadRiwayat(container) {
            container.innerHTML = `
                <div class="page-header">
                    <h2>Riwayat Absensi</h2>
                    <p>Rekapitulasi jejak kehadiran Anda di SMAN 68 Jakarta.</p>

                <div style="text-align:center; padding:50px;" id="riwayatLoader">
