<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin - SMAN 68 Jakarta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #006633 0%, #0088cc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .setup-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .setup-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .setup-header img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 102, 51, 0.3);
        }

        .setup-header h1 {
            color: #006633;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .setup-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .setup-step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 12px;
            border-left: 4px solid #0088cc;
        }

        .step-number {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #006633, #0088cc);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .step-text {
            flex: 1;
            color: #333;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        .form-group label i {
            margin-right: 8px;
            color: #006633;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0088cc;
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 136, 204, 0.1);
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background 0.3s ease;
        }

        .strength-text {
            font-size: 0.8rem;
            margin-top: 5px;
            color: #666;
        }

        .btn-setup {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #006633, #0088cc);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-setup:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 102, 51, 0.3);
        }

        .btn-setup:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .setup-footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 0.9rem;
        }

        .setup-footer a {
            color: #0088cc;
            text-decoration: none;
            font-weight: 600;
        }

        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        .firebase-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .status-dot.connected {
            background: #28a745;
        }

        .status-dot.disconnected {
            background: #dc3545;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .admin-preview {
            background: linear-gradient(135deg, #f5f5f5, #e8f5e9);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .admin-preview h4 {
            color: #006633;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .preview-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .preview-item:last-child {
            border-bottom: none;
        }

        .preview-item i {
            width: 25px;
            color: #0088cc;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-header">
            <img src="https://via.placeholder.com/80/006633/ffffff?text=68" alt="SMAN 68">
            <h1>Setup Admin</h1>
            <p>SMAN 68 Jakarta</p>
        </div>

        <div id="alertContainer"></div>

        <div class="firebase-status" id="firebaseStatus">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Menghubungkan ke Firebase...</span>
        </div>

        <div class="setup-step">
            <span class="step-number">1</span>
            <span class="step-text">Buat akun administrator pertama</span>
        </div>

        <form id="setupForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nama Lengkap</label>
                <input type="text" id="adminName" placeholder="Contoh: Admin SMAN 68" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Admin</label>
                <input type="email" id="adminEmail" placeholder="admin@sman68jkt.sch.id" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="adminPassword" placeholder="Minimal 8 karakter" required minlength="8">
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText">Masukkan password</div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-check-circle"></i> Konfirmasi Password</label>
                <input type="password" id="confirmPassword" placeholder="Ulangi password" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-key"></i> Secret Setup Key</label>
                <input type="password" id="secretKey" placeholder="Masukkan secret key" required>
                <small style="color: #666; display: block; margin-top: 5px;">
                    <i class="fas fa-info-circle"></i> Default: SMAN68SETUP2024
                </small>
            </div>

            <button type="submit" class="btn-setup" id="setupBtn">
                <i class="fas fa-user-plus"></i> Buat Akun Admin
            </button>
        </form>

        <div class="admin-preview" id="adminPreview" style="display: none;">
            <h4><i class="fas fa-check-circle" style="color: #28a745;"></i> Admin berhasil dibuat!</h4>
            <div class="preview-item">
                <i class="fas fa-user"></i>
                <span id="previewName"></span>
            </div>
            <div class="preview-item">
                <i class="fas fa-envelope"></i>
                <span id="previewEmail"></span>
            </div>
            <div class="preview-item">
                <i class="fas fa-calendar"></i>
                <span id="previewDate"></span>
            </div>
        </div>

        <div class="setup-footer">
            <p>Sudah punya akun? <a href="admin.html">Login Admin</a></p>
            <p style="margin-top: 15px; font-size: 0.8rem;">
                <i class="fas fa-shield-alt"></i> Data admin disimpan dengan aman di Firebase
            </p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDAcKcg3alPOTH3FFGelYmsW7jcMMe2PLI",
            authDomain: "upnvjdatsystem.firebaseapp.com",
            databaseURL: "https://upnvjdatsystem-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "upnvjdatsystem",
            storageBucket: "upnvjdatsystem.firebasestorage.app",
            messagingSenderId: "57095309946",
            appId: "1:57095309946:web:b0e9f3f86380d549ffc9c3"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const SECRET_KEY = "SMAN68SETUP2024";

        // DOM Elements
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const alertContainer = document.getElementById('alertContainer');
        const setupForm = document.getElementById('setupForm');
        const setupBtn = document.getElementById('setupBtn');
        const passwordInput = document.getElementById('adminPassword');
        const confirmInput = document.getElementById('confirmPassword');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        const adminPreview = document.getElementById('adminPreview');

        // Check Firebase Connection
        function checkFirebaseConnection() {
            statusDot.className = 'status-dot';
            statusText.textContent = 'Menghubungkan ke Firebase...';
            
            db.collection('settings').doc('connectionTest').get()
                .then(() => {
                    statusDot.classList.add('connected');
                    statusText.textContent = 'Firebase terhubung';
                })
                .catch((error) => {
                    statusDot.classList.add('disconnected');
                    statusText.textContent = 'Firebase tidak terhubung: ' + error.message;
                    showAlert('error', 'Gagal terhubung ke Firebase. Periksa koneksi internet Anda.');
                });
        }

        // Password Strength Checker
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 8) strength += 25;
            if (password.match(/[a-z]+/)) strength += 25;
            if (password.match(/[A-Z]+/)) strength += 25;
            if (password.match(/[0-9]+/)) strength += 25;
            
            strengthBar.style.width = strength + '%';
            
            if (strength <= 25) {
                strengthBar.style.background = '#dc3545';
                strengthText.textContent = 'Lemah';
            } else if (strength <= 50) {
                strengthBar.style.background = '#ffc107';
                strengthText.textContent = 'Sedang';
            } else if (strength <= 75) {
                strengthBar.style.background = '#17a2b8';
                strengthText.textContent = 'Kuat';
            } else {
                strengthBar.style.background = '#28a745';
                strengthText.textContent = 'Sangat Kuat';
            }
        });

        // Show Alert
        function showAlert(type, message) {
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };
            
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <i class="fas ${icons[type]}"></i>
                    <span>${message}</span>
                </div>
            `;
            
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        // Setup Form Submit
        setupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('adminName').value.trim();
            const email = document.getElementById('adminEmail').value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmInput.value;
            const secretKey = document.getElementById('secretKey').value;
            
            // Validations
            if (password !== confirmPassword) {
                showAlert('error', 'Password dan konfirmasi password tidak cocok!');
                return;
            }
            
            if (password.length < 8) {
                showAlert('error', 'Password minimal 8 karakter!');
                return;
            }
            
            if (secretKey !== SECRET_KEY) {
                showAlert('error', 'Secret key tidak valid!');
                return;
            }
            
            setupBtn.disabled = true;
            setupBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Membuat akun...';
            
            try {
                // Check if admin already exists
                const adminSnapshot = await db.collection('admins')
                    .where('email', '==', email)
                    .get();
                
                if (!adminSnapshot.empty) {
                    showAlert('error', 'Email admin sudah terdaftar!');
                    setupBtn.disabled = false;
                    setupBtn.innerHTML = '<i class="fas fa-user-plus"></i> Buat Akun Admin';
                    return;
                }
                
                // Create auth user
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Save admin data to Firestore
                await db.collection('admins').doc(user.uid).set({
                    name: name,
                    email: email,
                    role: 'admin',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    createdBy: 'setup',
                    status: 'active'
                });
                
                // Save to setup history
                await db.collection('setupHistory').add({
                    adminName: name,
                    adminEmail: email,
                    setupAt: firebase.firestore.FieldValue.serverTimestamp(),
                    setupBy: 'setup-page'
                });
                
                // Show success preview
                document.getElementById('previewName').textContent = name;
                document.getElementById('previewEmail').textContent = email;
                document.getElementById('previewDate').textContent = new Date().toLocaleString('id-ID');
                adminPreview.style.display = 'block';
                
                showAlert('success', '✅ Akun admin berhasil dibuat! Silakan login.');
                setupForm.reset();
                
                // Redirect to login after 3 seconds
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 3000);
                
            } catch (error) {
                console.error('Setup error:', error);
                let errorMessage = 'Gagal membuat akun admin.';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Email sudah terdaftar di Firebase Authentication.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Format email tidak valid.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password terlalu lemah.';
                }
                
                showAlert('error', errorMessage);
                setupBtn.disabled = false;
                setupBtn.innerHTML = '<i class="fas fa-user-plus"></i> Buat Akun Admin';
            }
        });

        // Initialize
        checkFirebaseConnection();
    </script>
</body>
</html>
